# Explicit configuration for your QEMU monitor
wallpaper {
    monitor = Virtual-1
    path = /home/abde/.config/backgrounds/4.jpg
    fit_mode = cover
}

# Fallback for any other monitors (leave monitor empty)
wallpaper {
    monitor =
    path = /home/abde/.config/backgrounds/4.jpg
    fit_mode = cover
}

# Optional: Disable splash text if you want a clean look
splash = false
